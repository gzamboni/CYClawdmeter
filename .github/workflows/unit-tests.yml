name: Unit Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: PlatformIO native tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: firmware

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: platformio-tests-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            platformio-tests-${{ runner.os }}-
            platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Run unit tests
        run: pio test -e native
