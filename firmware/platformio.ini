; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32_2432s028r

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
	-<*>
	+<usage_rate.cpp>
build_flags =
	-DUNIT_TEST

[env:esp32_2432s028r]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
; CYD uses CH340 USB-serial which is unreliable at 921600 on macOS.
; 460800 is the highest stable rate for CH340 on macOS.
upload_speed = 460800
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_src_filter =
	+<*>
	-<boards/>
	+<boards/esp32_2432s028r/>
build_flags =
	-DBOARD_ESP32_2432S028R
	-DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
	-DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
	-DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
	-DLV_CONF_SKIP
	-DLV_COLOR_DEPTH=16
	-DLV_USE_LOG=0
	-DLV_USE_BAR=1
	-DLV_USE_LABEL=1
	-DLV_USE_ARC=1
	-DLV_USE_BTN=1
	-DLV_USE_LINE=1
	-DLV_USE_OBJ=1
	-DLV_USE_IMG=1
	-DLV_USE_IMAGE=1
	-DLV_USE_ANIMIMG=0
	-DLV_TICK_CUSTOM=1
	-DLV_USE_SNAPSHOT=1
lib_deps =
	moononournation/GFX Library for Arduino@^1.6.4
	lvgl/lvgl@^9.2.0
	bblanchon/ArduinoJson@^7.0.0
	h2zero/NimBLE-Arduino@^2.1.1
